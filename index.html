<!doctype html>
<html lang="es">

<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Plan de alimentación</title>
  <style>
    body {
      font-family: system-ui, Arial, sans-serif;
      margin: 24px;
      line-height: 1.4;
    }

    h1 {
      font-size: 28px;
      margin-bottom: 12px;
    }

    .row {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
      margin: 12px 0 18px;
    }

    label {
      display: flex;
      flex-direction: column;
      font-size: 16px;
      gap: 6px;
    }

    select {
      font-size: 18px;
      padding: 10px 12px;
      min-width: 220px;
    }

    .card {
      border: 1px solid #ddd;
      border-radius: 12px;
      padding: 18px;
      max-width: 900px;
    }

    .meal {
      font-size: 26px;
      white-space: pre-wrap;
    }

    .controls {
      display: flex;
      gap: 10px;
      align-items: center;
      margin-top: 12px;
      flex-wrap: wrap;
    }

    button {
      font-size: 16px;
      padding: 10px 12px;
      border-radius: 10px;
      border: 1px solid #ccc;
      background: #fff;
      cursor: pointer;
    }

    button:hover {
      background: #f5f5f5;
    }

    .pdf-btn {
      display: inline-block;
      margin: 15px 10px;
      padding: 12px 18px;
      font-size: 20px;
      background: #2d6cdf;
      color: white;
      text-decoration: none;
      border-radius: 10px;
    }

    .pdf-btn:hover {
      background: #1f57b8;
    }
  </style>
</head>

<body>
  <h1>Plan de alimentación</h1>
  <a href="ver-pdf.html" target="_blank" class="pdf-btn">Ver plan completo en PDF</a>

  <div class="row">
    <label>
      Día
      <select id="daySelect"></select>
    </label>

    <label>
      Comida
      <select id="mealSelect"></select>
    </label>
  </div>

  <div class="card">
    <div id="output" class="meal">Cargando...</div>

    <div class="controls">
      <button id="fontMinus">A−</button>
      <button id="fontPlus">A+</button>
      <button id="toggleContrast">Alto contraste</button>
    </div>
  </div>
  <section id="ingredientes-section"
    style="margin-top:40px; text-align:left; max-width:700px; margin-left:auto; margin-right:auto;">
    <h2 style="font-size:28px;">Ingredientes de la semana</h2>
    <ul id="ingredientes-lista" style="font-size:22px; line-height:1.6; padding-left:25px;"></ul>
  </section>

  <script>
    const daySelect = document.getElementById("daySelect");
    const mealSelect = document.getElementById("mealSelect");
    const output = document.getElementById("output");

    const fontMinus = document.getElementById("fontMinus");
    const fontPlus = document.getElementById("fontPlus");
    const toggleContrast = document.getElementById("toggleContrast");

    let plan = {};
    const MEAL_ORDER = ["Desayuno", "Colación 1", "Comida", "Colación 2", "Cena"];

    function saveState() {
      localStorage.setItem("plan_day", daySelect.value);
      localStorage.setItem("plan_meal", mealSelect.value);
      localStorage.setItem("plan_font", output.style.fontSize || "26px");
      localStorage.setItem("plan_contrast", document.body.dataset.contrast || "");
    }

    function loadState() {
      const day = localStorage.getItem("plan_day");
      const meal = localStorage.getItem("plan_meal");
      const font = localStorage.getItem("plan_font");
      const contrast = localStorage.getItem("plan_contrast");

      if (font) output.style.fontSize = font;
      if (contrast) document.body.dataset.contrast = contrast;
      return { day, meal };
    }

    function applyContrast() {
      const on = document.body.dataset.contrast === "on";
      if (on) {
        document.body.style.background = "#000";
        document.body.style.color = "#fff";
        document.querySelectorAll(".card").forEach(c => c.style.borderColor = "#555");
      } else {
        document.body.style.background = "";
        document.body.style.color = "";
        document.querySelectorAll(".card").forEach(c => c.style.borderColor = "#ddd");
      }
    }

    function updateOutput() {
      const d = daySelect.value;
      const m = mealSelect.value;
      const text = (plan[d] && plan[d][m]) ? plan[d][m] : "No hay información.";
      output.textContent = text;
      saveState();
    }

    function fillDaysAndMeals(saved) {
      const days = Object.keys(plan);
      daySelect.innerHTML = days.map(d => `<option value="${d}">${d}</option>`).join("");

      // meals: usa el orden recomendado si existe
      const availableMeals = new Set();
      days.forEach(d => Object.keys(plan[d] || {}).forEach(m => availableMeals.add(m)));

      const mealsSorted = MEAL_ORDER.filter(m => availableMeals.has(m))
        .concat([...availableMeals].filter(m => !MEAL_ORDER.includes(m)));

      mealSelect.innerHTML = mealsSorted.map(m => `<option value="${m}">${m}</option>`).join("");

      if (saved.day && days.includes(saved.day)) daySelect.value = saved.day;
      if (saved.meal && mealsSorted.includes(saved.meal)) mealSelect.value = saved.meal;

      updateOutput();
    }

    async function init() {
      const saved = loadState();
      applyContrast();

      const res = await fetch("plan.json", { cache: "no-store" });
      plan = await res.json();

      fillDaysAndMeals(saved);

      daySelect.addEventListener("change", updateOutput);
      mealSelect.addEventListener("change", updateOutput);

      fontPlus.addEventListener("click", () => {
        const current = parseInt(getComputedStyle(output).fontSize, 10);
        output.style.fontSize = (current + 2) + "px";
        saveState();
      });

      fontMinus.addEventListener("click", () => {
        const current = parseInt(getComputedStyle(output).fontSize, 10);
        output.style.fontSize = Math.max(16, current - 2) + "px";
        saveState();
      });

      toggleContrast.addEventListener("click", () => {
        document.body.dataset.contrast = (document.body.dataset.contrast === "on") ? "" : "on";
        applyContrast();
        saveState();
      });
    }

    init().catch(err => {
      output.textContent = "Error cargando plan.json. Revisa que exista junto a index.html.";
      console.error(err);
    });

    let ingredientes = [];

    fetch("plan.json")
      .then(r => r.json())
      .then(data => {
        ingredientes = data.ingredientes || [];
        plan = data.plan || {};

        renderIngredientes();
        actualizar();
      })
      .catch(e => {
        document.getElementById("resultado").innerText = "Error cargando plan.json";
      });

    function renderIngredientes() {
      const lista = document.getElementById("ingredientes-lista");
      lista.innerHTML = "";

      ingredientes.forEach(item => {
        const li = document.createElement("li");
        li.textContent = item;
        lista.appendChild(li);
      });
    }

    function actualizar() {
      const dia = document.getElementById("dia").value;
      const comida = document.getElementById("comida").value;

      if (plan[dia] && plan[dia][comida]) {
        document.getElementById("resultado").innerText = plan[dia][comida];
      } else {
        document.getElementById("resultado").innerText = "No hay información disponible.";
      }
    }

    document.getElementById("dia").addEventListener("change", actualizar);
    document.getElementById("comida").addEventListener("change", actualizar);
  </script>
</body>

</html>
